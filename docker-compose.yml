services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: equity_swing_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-equity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-equity}
      POSTGRES_DB: ${POSTGRES_DB:-equity_swing}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-equity} -d ${POSTGRES_DB:-equity_swing}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
